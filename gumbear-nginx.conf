server {
    listen 80;
    server_name gumbear.alora.baby *.gumbear.alora.baby;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gumbear.alora.baby *.gumbear.alora.baby;

    ssl_certificate /etc/letsencrypt/live/gumbear.alora.baby/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gumbear.alora.baby/privkey.pem;

    location /download/ {
        alias /var/www/gumbear/download/;
        autoindex on;
        
        # Force download
        types { application/octet-stream *; }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    location /install {
        alias /var/www/gumbear/install.sh;
        default_type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
